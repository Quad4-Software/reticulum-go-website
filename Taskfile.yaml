version: '3'

tasks:
  frontend:build:
    dir: frontend
    cmds:
      - pnpm install
      - pnpm build
    sources:
      - src/**/*
      - package.json
      - vite.config.ts
    generates:
      - build/**/*

  dev:
    dir: frontend
    cmds:
      - pnpm dev

  clean:
    cmds:
      - rm -rf frontend/build

  format:
    desc: Format code
    cmds:
      - cd frontend && pnpm exec prettier --write .

  lint:
    dir: frontend
    cmds:
      - pnpm exec eslint .

  check:
    dir: frontend
    cmds:
      - pnpm run check

  audit:
    desc: Run pnpm audit
    dir: frontend
    cmds:
      - pnpm audit

  update:
    desc: Update pnpm dependencies
    dir: frontend
    cmds:
      - pnpm update

  update:latest:
    desc: Update pnpm dependencies to latest versions
    dir: frontend
    cmds:
      - pnpm update --latest

  outdated:
    desc: Show outdated pnpm dependencies
    dir: frontend
    cmds:
      - pnpm outdated

  install:
    desc: Install pnpm dependencies
    dir: frontend
    cmds:
      - pnpm install

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -f Dockerfile -t reticulum-web .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 3000:3000 reticulum-web

  docs:zip:
    desc: Package documentation into ZIP files
    cmds:
      - mkdir -p releases
      - zip -j releases/docs-en.zip frontend/src/lib/docs/introduction.md frontend/src/lib/docs/usage.md
      - zip -j releases/docs-ru.zip frontend/src/lib/docs/introduction.ru.md frontend/src/lib/docs/usage.ru.md
      - zip -j releases/docs-de.zip frontend/src/lib/docs/introduction.de.md frontend/src/lib/docs/usage.de.md
      - zip -j releases/docs-it.zip frontend/src/lib/docs/introduction.it.md frontend/src/lib/docs/usage.it.md

  validate:
    desc: Run all quality checks (format, lint, check, audit)
    cmds:
      - task: format
      - task: lint
      - task: check
      - task: audit

