version: '3'

tasks:
  frontend:build:
    dir: frontend
    cmds:
      - pnpm install
      - pnpm build
    sources:
      - src/**/*
      - package.json
      - vite.config.ts
    generates:
      - build/**/*

  server:prepare:
    deps: [frontend:build]
    cmds:
      - rm -rf cmd/server/dist
      - mkdir -p cmd/server/dist
      - cp -r frontend/build/* cmd/server/dist/

  server:build:
    deps: [server:prepare]
    cmds:
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o reticulum-go-web ./cmd/server
    sources:
      - cmd/server/*.go
    generates:
      - reticulum-go-web

  dev:
    dir: frontend
    cmds:
      - pnpm dev

  clean:
    cmds:
      - rm -rf frontend/build
      - rm -rf cmd/server/dist
      - rm -f reticulum-go-web

  format:
    desc: Format code (frontend and go)
    cmds:
      - cd frontend && pnpm exec prettier --write .
      - go fmt ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  lint:
    dir: frontend
    cmds:
      - pnpm exec eslint .

  check:
    dir: frontend
    cmds:
      - pnpm run check

  audit:
    desc: Run pnpm audit
    dir: frontend
    cmds:
      - pnpm audit

  update:
    desc: Update pnpm dependencies
    dir: frontend
    cmds:
      - pnpm update

  update:latest:
    desc: Update pnpm dependencies to latest versions
    dir: frontend
    cmds:
      - pnpm update --latest

  outdated:
    desc: Show outdated pnpm dependencies
    dir: frontend
    cmds:
      - pnpm outdated

  install:
    desc: Install pnpm dependencies
    dir: frontend
    cmds:
      - pnpm install

  scan:
    desc: Run gosec security scanner
    cmds:
      - gosec ./...

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -f Dockerfile -t reticulum-go-web .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 8080:8080 reticulum-go-web

  docs:zip:
    desc: Package documentation into ZIP files
    cmds:
      - mkdir -p releases
      - zip -j releases/docs-en.zip frontend/src/lib/docs/introduction.md frontend/src/lib/docs/usage.md
      - zip -j releases/docs-ru.zip frontend/src/lib/docs/introduction.ru.md frontend/src/lib/docs/usage.ru.md
      - zip -j releases/docs-de.zip frontend/src/lib/docs/introduction.de.md frontend/src/lib/docs/usage.de.md
      - zip -j releases/docs-it.zip frontend/src/lib/docs/introduction.it.md frontend/src/lib/docs/usage.it.md

  validate:
    desc: Run all quality checks (format, test, lint, check, scan, audit)
    cmds:
      - task: format
      - task: test
      - task: lint
      - task: check
      - task: scan
      - task: audit

