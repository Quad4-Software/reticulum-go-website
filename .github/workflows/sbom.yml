# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0              9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   aquasecurity/trivy-action@v0.36.0    ed142fd0673e97e23eac54620cfb913e5ce36c25
#   softprops/action-gh-release@v2.4.2   5be0e66d93ac7ed76da52eca8bb058f665c3a5fe
#
name: Release with SBOM

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-sbom-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI_NODE_MAJOR: '24'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Install dependencies
        run: make install

      - name: Prepare SBOM output directory
        run: mkdir -p sbom

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom/sbom.cyclonedx.json
          include-dev-deps: true
          skip-dirs: .pnpm-store

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          tag_name: ${{ github.ref_name }}
          files: sbom/sbom.cyclonedx.json
          generate_release_notes: false
