# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0            9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   aquasecurity/trivy-action@v0.36.0    ed142fd0673e97e23eac54620cfb913e5ce36c25
#
name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
  schedule:
    - cron: '30 12 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_NODE_MAJOR: '24'

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Svelte check
        run: make check

      - name: Unit tests
        run: make test

      - name: Micro-benchmarks
        run: make bench

      - name: Audit dependencies
        run: make audit

      - name: Link check
        run: make check-links

      - name: Documentation check
        run: make check-docs

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Build
        run: make frontend-build

      - name: Bundle size budget
        run: make bundle-budget

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build container image
        run: make docker-build

  trivy:
    name: Trivy (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: repository
            scan-ref: .
          - target: frontend
            scan-ref: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.scan-ref }}
          exit-code: '1'
          skip-dirs: .pnpm-store
          severity: CRITICAL,HIGH
