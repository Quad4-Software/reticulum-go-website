# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0            9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#
name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_NODE_MAJOR: '24'

jobs:
  validate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: lint
            name: Lint
            command: make lint
          - id: check
            name: Svelte check
            command: make check
          - id: test
            name: Unit tests
            command: make test
          - id: bench
            name: Micro-benchmarks
            command: make bench
          - id: audit
            name: pnpm audit
            command: make audit
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Install dependencies
        run: make install

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  links:
    name: Link check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check external URLs
        run: make check-links

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [validate, links]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Build
        run: make frontend-build

      - name: Bundle size budget
        run: make bundle-budget
