# Pinned actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0            9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   aquasecurity/trivy-action@v0.36.0  ed142fd0673e97e23eac54620cfb913e5ce36c25
#
name: Security Scans

on:
  schedule:
    - cron: '30 12 * * *'
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI_NODE_MAJOR: '24'

jobs:
  audit:
    name: Frontend audit (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: lint
            command: make lint
          - id: check
            command: make check
          - id: audit
            command: make audit
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh "${CI_NODE_MAJOR}"

      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh

      - name: Install dependencies
        run: make install

      - name: Run ${{ matrix.id }}
        run: ${{ matrix.command }}

  trivy:
    name: Trivy (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: repository
            scan-ref: .
          - target: frontend
            scan-ref: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ matrix.scan-ref }}
          exit-code: '1'
          skip-dirs: .pnpm-store
          severity: CRITICAL,HIGH
