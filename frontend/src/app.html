<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="/logo.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#00ADD8" />

		<!-- SEO & Meta Tags -->
		<title>Reticulum-Go | Resilient, Sovereign Networking</title>
		<meta
			name="description"
			content="Reticulum-Go is a high-performance Go implementation of the Reticulum Network Stack. Build resilient, encrypted, and decentralised communication networks."
		/>
		<meta
			name="keywords"
			content="reticulum, reticulum-go, mesh network, cryptography, p2p, decentralised, go, wasm, quad4"
		/>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://reticulum-go.quad4.io/" />
		<meta property="og:title" content="Reticulum-Go | Resilient, Sovereign Networking" />
		<meta
			property="og:description"
			content="Reticulum-Go is a high-performance Go implementation of the Reticulum Network Stack. Build resilient, encrypted, and decentralised communication networks."
		/>
		<meta property="og:image" content="https://reticulum-go.quad4.io/logo.svg" />
		<meta property="og:image:alt" content="Reticulum-Go Logo" />
		<meta property="og:site_name" content="Reticulum-Go" />
		<meta property="og:locale" content="en" />
		<meta property="og:locale:alternate" content="de" />
		<meta property="og:locale:alternate" content="ru" />
		<meta property="og:locale:alternate" content="it" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://reticulum-go.quad4.io/" />
		<meta name="twitter:title" content="Reticulum-Go | Resilient, Sovereign Networking" />
		<meta
			name="twitter:description"
			content="Reticulum-Go is a high-performance Go implementation of the Reticulum Network Stack. Build resilient, encrypted, and decentralised communication networks."
		/>
		<meta name="twitter:image" content="https://reticulum-go.quad4.io/logo.svg" />
		<meta name="twitter:image:alt" content="Reticulum-Go Logo" />

		<link rel="dns-prefetch" href="https://git.quad4.io" />
		<link rel="dns-prefetch" href="https://unsigned.io" />
		<link rel="preconnect" href="https://git.quad4.io" crossorigin />
		<link rel="preconnect" href="https://unsigned.io" crossorigin />

		<script>
			(function () {
				var t = localStorage.getItem('theme');
				var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.classList.toggle('dark', dark);
				window.reticulumReady = function () {
					console.log('Reticulum WASM initialized');
				};
			})();
		</script>
		<script src="/wasm_exec.js" defer></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<noscript>
			<style>
				#js-disabled-banner {
					position: fixed;
					left: 1rem;
					right: 1rem;
					bottom: 1rem;
					z-index: 9999;
					background: #0f172a;
					color: #e2e8f0;
					padding: 0.75rem 1rem;
					border-radius: 0.75rem;
					font-family: system-ui, sans-serif;
					display: flex;
					align-items: center;
					gap: 0.75rem;
					animation: hide-js-banner 8s ease 6s forwards;
				}
				#js-disabled-banner-text {
					flex: 1;
					text-align: center;
					padding-left: 1.5rem;
				}
				#js-disabled-banner-close {
					color: #e2e8f0;
					text-decoration: none;
					font-weight: 700;
					line-height: 1;
					font-size: 0.9rem;
					margin-left: auto;
					width: 1.5rem;
					height: 1.5rem;
					border-radius: 9999px;
					display: inline-flex;
					align-items: center;
					justify-content: center;
					border: 1px solid rgba(226, 232, 240, 0.35);
				}
				#js-disabled-banner-dismissed:target + #js-disabled-banner {
					display: none;
				}
				@keyframes hide-js-banner {
					to {
						opacity: 0;
						visibility: hidden;
						pointer-events: none;
					}
				}
			</style>
			<div id="js-disabled-banner-dismissed"></div>
			<div id="js-disabled-banner">
				<span id="js-disabled-banner-text"
					>JavaScript is disabled. Main pages work without it. Interactive WASM pages require JavaScript.</span
				>
				<a id="js-disabled-banner-close" href="#js-disabled-banner-dismissed" aria-label="Close">X</a>
			</div>
		</noscript>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
