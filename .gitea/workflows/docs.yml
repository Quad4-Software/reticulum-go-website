name: Release Docs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://git.quad4.io/actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Get Metadata and Package Docs
        id: prepare
        run: |
          FULL_HASH="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --format=%B "${{ github.sha }}" || echo "Release ${{ github.ref_name }}")

          echo "full_hash=${FULL_HASH}" >> $GITHUB_OUTPUT
          echo "commit_msg<<EOF" >> $GITHUB_OUTPUT
          echo "${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          make docs-zip
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Update Release with Docs
        uses: https://git.quad4.io/actions/gitea-release-action@fe8e0322804b48e34e3bddbbf6335bd2b1046eb7 # v1.3.5
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            releases/docs-en.zip
            releases/docs-ru.zip
            releases/docs-de.zip
            releases/docs-it.zip
          sha256sum: true
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
