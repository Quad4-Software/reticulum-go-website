name: Release Docs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-docs:
    runs-on: ubuntu-latest
    env:
      GITEA_SERVER_URL: ${{ github.server_url }}
      GITEA_REPOSITORY: ${{ github.repository }}
      GITEA_SHA: ${{ github.sha }}
      GITEA_REF: ${{ github.ref }}
      GITEA_REF_NAME: ${{ github.ref_name }}
      GITEA_REF_TYPE: ${{ github.ref_type }}
      GITEA_WORKSPACE: ${{ github.workspace }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REF: ${{ github.ref }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
      GITHUB_WORKSPACE: ${{ github.workspace }}
      GITHUB_TOKEN: ${{ github.token }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
    steps:
      - name: Checkout
        run: |
          set -eu
          SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
          REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
          if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
            echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
            exit 1
          fi
          if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
            TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
            git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
          fi
          git clone "${SERVER}/${REPO}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Get Metadata and Package Docs
        id: prepare
        run: sh scripts/docs/prepare-release-docs.sh

      - name: Update Release with Docs
        uses: https://git.quad4.io/actions/gitea-release-action@fe8e0322804b48e34e3bddbbf6335bd2b1046eb7 # v1.3.5
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            releases/docs-en.zip
            releases/docs-ru.zip
            releases/docs-de.zip
            releases/docs-it.zip
          sha256sum: true
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
