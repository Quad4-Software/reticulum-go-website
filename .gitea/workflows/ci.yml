name: CI

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://git.quad4.io/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: https://git.quad4.io/actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '23'
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make lint
      - name: Frontend checks
        run: make check
      - name: Unit tests
        run: make test
      - name: Link check (external URLs)
        run: make check-links
      - name: Audit dependencies
        run: make audit

  build:
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - name: Checkout
        uses: https://git.quad4.io/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: https://git.quad4.io/actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '23'
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Build
        run: make frontend-build
