name: CI

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      GITEA_SERVER_URL: ${{ github.server_url }}
      GITEA_REPOSITORY: ${{ github.repository }}
      GITEA_SHA: ${{ github.sha }}
      GITEA_REF: ${{ github.ref }}
      GITEA_REF_NAME: ${{ github.ref_name }}
      GITEA_REF_TYPE: ${{ github.ref_type }}
      GITEA_WORKSPACE: ${{ github.workspace }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REF: ${{ github.ref }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
      GITHUB_WORKSPACE: ${{ github.workspace }}
      GITHUB_TOKEN: ${{ github.token }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
    steps:
      - name: Checkout
        run: |
          set -eu
          SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
          REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
          if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
            echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
            exit 1
          fi
          if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
            TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
            git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
          fi
          git clone "${SERVER}/${REPO}.git" .
          git checkout "${GITHUB_SHA}"
      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh 24
      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh
      - name: Install dependencies
        run: make install
      - name: Lint
        run: make lint
      - name: Frontend checks
        run: make check
      - name: Unit tests
        run: make test
      - name: Micro-benchmarks
        run: make bench
      - name: Link check (external URLs)
        run: make check-links
      - name: Audit dependencies
        run: make audit

  build:
    runs-on: ubuntu-latest
    needs: [checks]
    env:
      GITEA_SERVER_URL: ${{ github.server_url }}
      GITEA_REPOSITORY: ${{ github.repository }}
      GITEA_SHA: ${{ github.sha }}
      GITEA_REF: ${{ github.ref }}
      GITEA_REF_NAME: ${{ github.ref_name }}
      GITEA_REF_TYPE: ${{ github.ref_type }}
      GITEA_WORKSPACE: ${{ github.workspace }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REF: ${{ github.ref }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_REF_TYPE: ${{ github.ref_type }}
      GITHUB_WORKSPACE: ${{ github.workspace }}
      GITHUB_TOKEN: ${{ github.token }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
    steps:
      - name: Checkout
        run: |
          set -eu
          SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
          REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
          if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
            echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
            exit 1
          fi
          if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
            TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
            git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
          fi
          git clone "${SERVER}/${REPO}.git" .
          git checkout "${GITHUB_SHA}"
      - name: Setup Node.js
        run: sh scripts/ci/setup-node.sh 24
      - name: Enable pnpm
        run: sh scripts/ci/setup-pnpm.sh
      - name: Build
        run: make frontend-build
      - name: Bundle size budget
        run: make bundle-budget
