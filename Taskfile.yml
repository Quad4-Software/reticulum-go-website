version: '3'

vars:
  FRONTEND: frontend

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  docs:check:
    desc: Validate docs nav, files, and internal /docs/ links
    cmds:
      - node scripts/check-docs.mjs

  docs:sync:
    desc: Sync English docs from a Reticulum-Go checkout
    cmds:
      - sh scripts/sync-docs.sh

  docs:zip:
    desc: Package English docs into releases/docs-en.zip
    cmds:
      - make docs-zip

  docs:release:
    desc: Prepare docs release metadata and zip archives
    cmds:
      - sh scripts/docs/prepare-release-docs.sh

  docs:
    desc: Sync docs from upstream then validate
    deps: [docs:sync]
    cmds:
      - task: docs:check

  wasm:micron:
    desc: Fetch latest Micron-Parser-Go WASM and refresh SHA-384 SRI hashes
    cmds:
      - node scripts/update-micron-wasm.mjs

  dev:
    desc: Run frontend development server
    dir: "{{.FRONTEND}}"
    cmds:
      - pnpm dev

  format:
    desc: Format frontend sources with Prettier
    dir: "{{.FRONTEND}}"
    cmds:
      - pnpm exec prettier --write .

  lint:
    desc: Run ESLint in frontend
    dir: "{{.FRONTEND}}"
    cmds:
      - pnpm exec eslint .

  check:
    desc: Typecheck and svelte-check
    dir: "{{.FRONTEND}}"
    cmds:
      - pnpm run check

  test:
    desc: Run Vitest unit tests
    dir: "{{.FRONTEND}}"
    cmds:
      - pnpm test

  validate:
    desc: Format, lint, check, and test the frontend
    cmds:
      - task: format
      - task: lint
      - task: check
      - task: test
